    <!-- LOGO -->

    <nav id="desktopNav" style="display:flex;align-items:center;gap:.15rem;">

    <!-- RIGHT ACTIONS -->
    <div style="display:flex;align-items:center;gap:.65rem;flex-shrink:0;">
      <a href="tel:+12508917075" onclick="trackCallClick()" id="hCallBtn" style="display:none;align-items:center;gap:.4rem;background:#c9933a;color:#fff;padding:.6rem 1rem;border-radius:10px;font-size:.85rem;font-weight:700;text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.15);">
        <i data-feather="phone" style="width:13px;height:13px;"></i> Call Now
      </a>
      <a href="/contact.html" id="hCta" onclick="trackQuoteClick()" style="display:inline-flex;align-items:center;gap:.4rem;background:#c9933a;color:#fff;padding:.58rem 1.15rem;border-radius:9px;font-size:.82rem;font-weight:700;text-decoration:none;box-shadow:0 3px 10px rgba(201,147,58,.3);transition:background .2s;">
        <i data-feather="send" style="width:12px;height:12px;"></i> Get Free Quote

      <button id="hMenuBtn" style="display:none;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;" aria-label="Open menu">

  <!-- MOBILE MENU -->

      <a href="/faq.html" class="mob-link">FAQ</a>
      <a href="/contact.html" class="mob-link">Contact</a>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem;">
      <a href="tel:+12508917075" onclick="trackCallClick()" style="display:flex;align-items:center;justify-content:center;gap:.4rem;border:1px solid #e2e8f0;padding:.7rem;border-radius:9px;font-size:.84rem;font-weight:600;color:#0a0f1e;text-decoration:none;">
        <i data-feather="phone" style="width:13px;height:13px;"></i> Call Now
      </a>

<style>
.top-bar-link:hover { color: #c9933a !important; }
.mob-link { padding: .65rem .85rem; border-radius: 9px; font-size: .88rem; font-weight: 500; color: #334155; text-decoration: none; display: block; transition: background .15s; }
.mob-link:hover { background: #f8fafc; }
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  if (window.feather) feather.replace();

  const btn  = document.getElementById("hMenuBtn");
  const menu = document.getElementById("hMobileMenu");
  if (btn && menu) btn.addEventListener("click", () => {
    const open = menu.style.display === "block";
    menu.style.display = open ? "none" : "block";
    btn.setAttribute("aria-expanded", String(!open));
  });

  window.addEventListener("scroll", () => {
    const h = document.getElementById("siteHeader");
    if (h) h.style.boxShadow = window.scrollY > 8 ? "0 4px 24px rgba(0,0,0,.09)" : "none";
  });

  // Highlight active nav link
  document.querySelectorAll(".hnav-link").forEach(l => {
    const path = l.getAttribute("href").replace("/","");
    if (location.pathname === l.getAttribute("href") || (path && location.pathname.includes(path))) {
      l.classList.add("active");
    }
  });
});

function trackCallClick() {
  if (typeof gtag === "function") {
    gtag('event','phone_click',{'event_category':'conversion','event_label':'header_phone'});
  }
}
function trackQuoteClick() {
  if (typeof gtag === "function") {
    gtag('event','quote_click',{'event_category':'conversion','event_label':'header_quote'});
  }
}
function trackContactPhone() {
  if (typeof gtag === "function") {
    gtag('event','phone_click',{'event_category':'conversion','event_label':'contact_page'});
  }
}
function trackInstagram() {
  if (typeof gtag === "function") {
    gtag('event','social_click',{'event_category':'engagement','event_label':'instagram'});
  }
}
function trackFacebook() {
  if (typeof gtag === "function") {
    gtag('event','social_click',{'event_category':'engagement','event_label':'facebook'});
  }
}
function trackGallery(category) {
  if (typeof gtag === "function") {
    gtag('event','gallery_click',{'event_category':'gallery','event_label':category});
  }
}
</script>
