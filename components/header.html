<style>
.hnav-link {

@media (max-width: 920px) {

  #hCallBtn   { display: flex !important; }

<script>
document.addEventListener("DOMContentLoaded", () => {
  const btn  = document.getElementById("hMenuBtn");
  const menu = document.getElementById("hMobileMenu");
  if (btn && menu) btn.addEventListener("click", () => {
    menu.style.display = menu.style.display === "none" ? "block" : "none";
  });
  window.addEventListener("scroll", () => {
    const h = document.getElementById("siteHeader");
    if (h) h.style.boxShadow = window.scrollY > 8 ? "0 4px 24px rgba(0,0,0,.09)" : "none";
  });
  // highlight active nav
  const links = document.querySelectorAll(".hnav-link");
  links.forEach(l => {
    if (l.href === location.href || location.pathname.includes(l.getAttribute("href").replace("/",""))) {
      l.style.background = "rgba(201,147,58,.1)";
      l.style.color = "#c9933a";
      l.style.fontWeight = "600";
    }
  });
});
</script>

<script>
function trackCallClick(){
if(typeof gtag === "function"){
gtag('event','phone_click',{
'event_category':'conversion',
'event_label':'header_phone'
});
}
}

function trackQuoteClick(){
if(typeof gtag === "function"){
gtag('event','quote_click',{
'event_category':'conversion',
'event_label':'header_quote'
});
}
}
</script>
